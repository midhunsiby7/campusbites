<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Add New Food - CAMPUSBITES</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=20260410b">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}?v=20260410b">
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body class="admin-body">

  <div class="form-container">
    <h2>Add New Food</h2>
    <form action="/admin/add-food" method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="form-group">
        <label for="name">Food Name:</label>
        <input type="text" name="name" id="name" required>
      </div>

      <div class="form-group">
        <label for="price">Price (₹):</label>
        <input type="number" name="price" id="price" step="0.01" required>
      </div>

      <div class="form-group">
        <label for="category">Category:</label>
        <select name="category" id="category" required>
          <option value="breakfast">Breakfast</option>
          <option value="lunch">Lunch</option>
        </select>
      </div>

      <div class="form-group">
        <label for="about">Description:</label>
        <textarea name="about" id="about" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label>Available Days:</label>
        <div class="days-grid">
          <label><input type="checkbox" name="days" value="mon" checked> Mon</label>
          <label><input type="checkbox" name="days" value="tue" checked> Tue</label>
          <label><input type="checkbox" name="days" value="wed" checked> Wed</label>
          <label><input type="checkbox" name="days" value="thu" checked> Thu</label>
          <label><input type="checkbox" name="days" value="fri" checked> Fri</label>
          <label><input type="checkbox" name="days" value="sat"> Sat</label>
          <label><input type="checkbox" name="days" value="sun"> Sun</label>
        </div>
      </div>

      <hr>

      <!-- Breakfast defaults -->
      <div class="form-group breakfast-default">
        <label for="default_breakfast_start">Default Breakfast Start</label>
        <input type="time" name="default_breakfast_start" id="default_breakfast_start" data-default="08:00" value="08:00">
      </div>
      <div class="form-group breakfast-default">
        <label for="default_breakfast_end">Default Breakfast End</label>
        <input type="time" name="default_breakfast_end" id="default_breakfast_end" data-default="11:00" value="11:00">
      </div>

      <!-- Lunch defaults -->
      <div class="form-group lunch-default">
        <label for="default_lunch_start">Default Lunch Start</label>
        <input type="time" name="default_lunch_start" id="default_lunch_start" data-default="12:00" value="12:00">
      </div>
      <div class="form-group lunch-default">
        <label for="default_lunch_end">Default Lunch End</label>
        <input type="time" name="default_lunch_end" id="default_lunch_end" data-default="15:00" value="15:00">
      </div>

      <div class="form-group">
        <label for="default_stock">Default Stock:</label>
        <input type="number" name="default_stock" id="default_stock" min="0" value="0" required>
      </div>

      <div class="form-group">
        <label for="image">Food Image:</label>
        <input type="file" name="image" id="image" accept="image/*" required>
      </div>

      <button type="submit">Add Food</button>
    </form>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const catSelect = document.querySelector('select[name="category"]');
  const breakfastFields = document.querySelectorAll('.breakfast-default');
  const lunchFields = document.querySelectorAll('.lunch-default');

  const breakfastStart = document.querySelector('input[name="default_breakfast_start"]');
  const breakfastEnd   = document.querySelector('input[name="default_breakfast_end"]');
  const lunchStart     = document.querySelector('input[name="default_lunch_start"]');
  const lunchEnd       = document.querySelector('input[name="default_lunch_end"]');

  function toggleFields() {
    const cat = catSelect.value;
    if (cat === 'breakfast') {
      breakfastFields.forEach(el => el.style.display = 'block');
      lunchFields.forEach(el => el.style.display = 'none');
      if (!breakfastStart.value) breakfastStart.value = breakfastStart.dataset.default || '08:00';
      if (!breakfastEnd.value) breakfastEnd.value = breakfastEnd.dataset.default || '11:00';
    } else {
      breakfastFields.forEach(el => el.style.display = 'none');
      lunchFields.forEach(el => el.style.display = 'block');
      if (!lunchStart.value) lunchStart.value = lunchStart.dataset.default || '12:00';
      if (!lunchEnd.value) lunchEnd.value = lunchEnd.dataset.default || '15:00';
    }
  }

  catSelect.addEventListener('change', toggleFields);
  toggleFields();
});
</script>

</body>
</html>
