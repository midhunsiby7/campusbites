  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Admin Login - CAMPUSBITES</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <style>
    body.admin-login-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      /* Premium Slate Gradient Background */
      background: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    
    .admin-login-box {
      --box-primary: #f8fafc;
      --box-accent: #3b82f6;
      
      max-width: 420px;
      width: 100%;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 3rem;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: loginFadeUp 0.8s ease-out;
    }

    .admin-login-box h2 {
      color: var(--box-primary);
      margin-bottom: 35px;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .admin-login-box input {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .admin-login-box input:focus {
      outline: none;
      border-color: var(--box-accent);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
    }

    .admin-login-box button {
      width: 100%;
      padding: 14px;
      background: var(--box-accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s ease;
    }

    .admin-login-box button:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    .admin-login-box .error {
      color: #ef4444;
      margin-top: 20px;
      font-size: 0.95rem;
      font-weight: 600;
      background: rgba(239, 68, 68, 0.1);
      padding: 10px;
      border-radius: 8px;
    }

    @keyframes loginFadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="admin-body admin-login-page">
  <div class="admin-login-box">
    <h2>Admin Login</h2>
    <form method="POST" action="/admin/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
    </form>
  </div>
</body>
</html>
