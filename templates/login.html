<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>CampusBites Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/glassmorphism_login.css') }}">
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <style>
    /* Small overrides for integration */
    .error-box {
      background: #ffe5e5;
      color: #d8000c;
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      border: 1px solid #d8000c;
      display: none;
      animation: fadeIn 0.3s ease-in-out;
      text-align: center;
      width: 100%;
    }
    
    .success-box {
      background: #e5ffe5;
      color: #008000;
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      border: 1px solid #008000;
      display: none;
      animation: fadeIn 0.3s ease-in-out;
      text-align: center;
      width: 100%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <section>
    <div class="leaves">
      <div class="set">
        <div><img src="{{ url_for('static', filename='images/leaf_01.png') }}"></div>
        <div><img src="{{ url_for('static', filename='images/leaf_02.png') }}"></div>
        <div><img src="{{ url_for('static', filename='images/leaf_03.png') }}"></div>
        <div><img src="{{ url_for('static', filename='images/leaf_04.png') }}"></div>
        <div><img src="{{ url_for('static', filename='images/leaf_01.png') }}"></div>
        <div><img src="{{ url_for('static', filename='images/leaf_02.png') }}"></div>
        <div><img src="{{ url_for('static', filename='images/leaf_03.png') }}"></div>
        <div><img src="{{ url_for('static', filename='images/leaf_04.png') }}"></div>
      </div>
    </div>
    <img src="{{ url_for('static', filename='images/bg.jpg') }}" class="bg">
    <img src="{{ url_for('static', filename='images/girl.png') }}" class="girl">
    <img src="{{ url_for('static', filename='images/trees.png') }}" class="trees">
    
    <div class="login">
      <h2 id="formTitle">Sign In</h2>
      <div id="error-box" class="error-box"></div>
      <div id="success-box" class="success-box"></div>
      
      <div class="inputBox" id="emailBox">
        <input type="email" id="email" placeholder="Email">
      </div>
      <div class="inputBox" id="passwordBox">
        <input type="password" id="password" placeholder="Password">
      </div>
      
      <div class="inputBox" id="loginBtnBox">
        <input type="submit" value="Login" id="emailLogin" class="btn">
      </div>
      <div class="inputBox" id="signupBtnBox" style="display:none;">
        <input type="submit" value="Sign Up" id="emailRegisterBtn" class="btn">
      </div>
      <div class="inputBox" id="resetBtnBox" style="display:none;">
        <input type="submit" value="Reset Password" id="resetPasswordBtn" class="btn">
      </div>

      <div class="inputBox" id="googleBtnBox" style="margin-top: -10px;">
        <input type="submit" value="Login with Google" id="googleLogin" class="btn google-btn">
      </div>
      
      <div class="group" id="loginLinks">
        <a href="#" id="showForgot">Forget Password</a>
        <a href="#" id="showSignup">Signup</a>
      </div>
      <div class="group" id="backLinks" style="display:none; justify-content: center;">
        <a href="#" id="showLogin">Back to Login</a>
      </div>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup,
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      sendPasswordResetEmail
    }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    function showError(message) {
      const box = document.getElementById("error-box");
      box.innerText = message;
      box.style.display = "block";
      document.getElementById("success-box").style.display = "none";
    }

    // Fetch Firebase config from backend
    const config = await fetch("/firebase-config").then(res => res.json());
    const app = initializeApp(config);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // View logic
    const formTitle = document.getElementById('formTitle');
    const passwordBox = document.getElementById('passwordBox');
    const loginBtnBox = document.getElementById('loginBtnBox');
    const signupBtnBox = document.getElementById('signupBtnBox');
    const resetBtnBox = document.getElementById('resetBtnBox');
    const googleBtnBox = document.getElementById('googleBtnBox');
    const loginLinks = document.getElementById('loginLinks');
    const backLinks = document.getElementById('backLinks');

    document.getElementById('showSignup').addEventListener('click', (e) => {
      e.preventDefault();
      formTitle.innerText = "Sign Up";
      passwordBox.style.display = "block";
      loginBtnBox.style.display = "none";
      signupBtnBox.style.display = "block";
      resetBtnBox.style.display = "none";
      googleBtnBox.style.display = "none";
      loginLinks.style.display = "none";
      backLinks.style.display = "flex";
      document.getElementById("error-box").style.display = "none";
      document.getElementById("success-box").style.display = "none";
    });

    document.getElementById('showForgot').addEventListener('click', (e) => {
      e.preventDefault();
      formTitle.innerText = "Reset Password";
      passwordBox.style.display = "none";
      loginBtnBox.style.display = "none";
      signupBtnBox.style.display = "none";
      resetBtnBox.style.display = "block";
      googleBtnBox.style.display = "none";
      loginLinks.style.display = "none";
      backLinks.style.display = "flex";
      document.getElementById("error-box").style.display = "none";
      document.getElementById("success-box").style.display = "none";
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
      e.preventDefault();
      formTitle.innerText = "Sign In";
      passwordBox.style.display = "block";
      loginBtnBox.style.display = "block";
      signupBtnBox.style.display = "none";
      resetBtnBox.style.display = "none";
      googleBtnBox.style.display = "block";
      loginLinks.style.display = "flex";
      backLinks.style.display = "none";
      document.getElementById("error-box").style.display = "none";
      document.getElementById("success-box").style.display = "none";
    });


    // --- Google Login ---
    document.getElementById("googleLogin").addEventListener("click", async (event) => {
      event.preventDefault();
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const idToken = await auth.currentUser.getIdToken(true);
        await sendIdTokenToBackend(idToken);
      } catch (error) {
        showError("Google login failed: " + error.message);
      }
    });

    // --- Email Login ---
    document.getElementById("emailLogin").addEventListener("click", async (event) => {
      event.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) return showError("Please provide both Email and Password.");

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const idToken = await auth.currentUser.getIdToken(true);
        await sendIdTokenToBackend(idToken);
      } catch (error) {
        showError("Email login failed: " + error.message);
      }
    });

    // --- Email Registration ---
    document.getElementById("emailRegisterBtn").addEventListener("click", async (event) => {
      event.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) return showError("Please fill in email & password to register");

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        const idToken = await auth.currentUser.getIdToken(true);
        await sendIdTokenToBackend(idToken);
      } catch (error) {
        showError("Registration failed: " + error.message);
      }
    });

    // --- Password Reset ---
    document.getElementById("resetPasswordBtn").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (!email) return showError("Please enter your email to reset password.");
      try {
        await sendPasswordResetEmail(auth, email);
        const successBox = document.getElementById("success-box");
        successBox.innerText = "Password reset email sent! Check your inbox.";
        successBox.style.display = "block";
        document.getElementById("error-box").style.display = "none";
      } catch(error) {
        showError("Reset failed: " + error.message);
      }
    });

    // --- Send ID Token to Backend ---
    async function sendIdTokenToBackend(idToken, name = null, phone = null) {
      const csrf = document.querySelector('meta[name="csrf-token"]')?.getAttribute("content") || "";
      const res = await fetch("/firebase-login", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRF-Token": csrf },
        body: JSON.stringify({ idToken, name, phone }),
        credentials: "same-origin"
      });

      const data = await res.json();
      if (res.ok) {
        if (data.need_profile) {
          window.location.href = "/complete-profile";
        } else {
          window.location.href = "/home";
        }
      } else {
        showError("Backend Error: " + (data.error || res.statusText));
      }
    }
  </script>
</body>
</html>
