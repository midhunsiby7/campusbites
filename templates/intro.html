<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Welcome - CAMPUSBITES</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body class="intro-page">
  <div class="intro-wrapper">
    <div class="intro-container">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="intro-logo" />
      
      <div class="intro-visual">
        <lottie-player src="{{ url_for('static', filename='images/intro.json') }}" background="transparent" speed="1"
          style="width: 200px; height: 200px;" loop autoplay>
        </lottie-player>
      </div>
      
      <h1 class="intro-heading">Welcome to CAMPUSBITES</h1>
    </div>
  </div>
  <script>
    setTimeout(() => {
      fetch('/check-login')
        .then(res => res.json())
        .then(data => {
          if (data.logged_in) {
            window.location.href = "/home";
          } else {
            window.location.href = "/login";
          }
        })
        .catch(error => {
          console.error("Error checking login status:", error);
          window.location.href = "/login"; // Redirect to login on API error
        });
    }, 3000);
  </script>
</body>

</html>
